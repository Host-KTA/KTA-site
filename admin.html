<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KTA CMS 2.0</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<h1>KTA CMS 2.0</h1>


<p>생성 종류</p>

<select id="createType">

<option value="post">
게시글 생성
</option>

<option value="category">
중분류 페이지 생성
</option>

</select>



<p>파일명</p>

<input id="filename" placeholder="episode01">



<p>제목</p>

<input id="title">



<p>카테고리</p>

<select id="category">

</select>



<p>설명</p>

<input id="description">



<p>Hero 제목</p>

<input id="heroTitle">



<p>Hero 설명</p>

<input id="heroDesc">



<p>본문</p>


<textarea
id="content"
rows="10"
cols="80">
</textarea>

<p>이미지</p>

<input
type="file"
id="imageFile"
accept="image/*">

<button id="uploadImage">
이미지 업로드
</button>
  

<br><br>


<button id="generateBtn">

생성

</button>



<script src="categories.js"></script>

<script src="admin.js"></script>



<script>

document
.getElementById("generateBtn")
.addEventListener("click", async () => {


  const categoryId =
    document.getElementById("category").value;


const selectedCategory =
    categories.find(
        category => category.id === categoryId
    );


const type =
    document.getElementById("createType").value;


const data = {

    type: type,

    title:
    type === "category"
    ? selectedCategory.name
    : document.getElementById("title").value,


    category:
    categoryId,


    folder:
    selectedCategory.folder,


    group:
    selectedCategory.group,


    file:
    type === "category"
    ? categoryId
    : document.getElementById("filename").value,


    description:
    type === "category"
    ? selectedCategory.name + " 페이지"
    : document.getElementById("description").value,


    heroTitle:
    type === "category"
    ? selectedCategory.name
    : document.getElementById("heroTitle").value,


    heroDesc:
    type === "category"
    ? selectedCategory.name + " 정보"
    : document.getElementById("heroDesc").value,


    content:
    document.getElementById("content").value

};
  await fetch(
    "https://ktacmsapi.koffeezip.workers.dev/",
    {

      method:"POST",

      headers:
      {
        "Content-Type":"application/json"
      },


      body:
      JSON.stringify(data)

    }
  );



  alert("생성 완료");


});


</script>


</body>

</html>
