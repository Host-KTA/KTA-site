<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KTA CMS 2.0</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<h1>KTA CMS 2.0</h1>


<p>제목</p>
<input id="title">


<p>Hero 제목</p>
<input id="heroTitle">


<p>Hero 설명</p>
<input id="heroDesc">


<p>본문</p>

<textarea
id="content"
rows="10"
cols="80">
</textarea>


<br><br>


<button id="generateBtn">

HTML 생성

</button>


<br><br>


<textarea
id="result"
rows="20"
cols="100">
</textarea>




<script>


const button =
document.getElementById("generateBtn");


button.addEventListener(
"click",

function(){


const title =
document.getElementById("title").value;


const heroTitle =
document.getElementById("heroTitle").value;


const heroDesc =
document.getElementById("heroDesc").value;


const content =
document.getElementById("content").value;




const html = `

<title>${title}</title>

<section class="hero">

<h2>${heroTitle}</h2>

<p>${heroDesc}</p>

</section>


<main class="container">

${content}

</main>

<script src="script.js"><\/script>

`;




document.getElementById("result").value
=
html;



}

);


</script>



</body>

</html>
