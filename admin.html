<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KTA CMS 2.0</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<h1>KTA CMS 2.0</h1>

<p>파일명</p>
<input id="filename" placeholder="episode01">

<p>제목</p>
<input id="title">

<p>카테고리</p>
  
<select id="category">
</select> 
  
<p>설명</p>
<input id="description">

<p>Hero 제목</p>
<input id="heroTitle">


<p>Hero 설명</p>
<input id="heroDesc">


<p>본문</p>

<textarea
id="content"
rows="10"
cols="80">
</textarea>

<p>목록에 추가할 코드</p>

<textarea
id="listCode"
rows="5"
cols="80"
readonly>
</textarea>
  
<p>posts.json 추가 코드</p>

<textarea
id="postCode"
rows="8"
cols="80"
readonly>
</textarea>

<br><br>


<button id="generateBtn">

HTML 생성

</button>


<br><br>


<textarea
id="result"
rows="20"
cols="100">
</textarea>

<script src="categories.js"></script>
<script src="admin.js"></script>

<script>
document
.getElementById("generateBtn")
.addEventListener("click", async () => {

  const data = {
    title: document.getElementById("title").value,
    category: document.getElementById("category").value,
    file: document.getElementById("filename").value,
    description: document.getElementById("description").value,
    heroTitle: document.getElementById("heroTitle").value,
    heroDesc: document.getElementById("heroDesc").value,
    content: document.getElementById("content").value
  };

  await fetch("https://ktacmsapi.koffeezip.workers.dev/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  alert("HTML 생성 완료");
});
</script>

</body>

</html>
