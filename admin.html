<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>KTA CMS 2.0</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<h1>KTA CMS 2.0</h1>

파일명

<br>

<input id="filename">

<br><br>


페이지 제목

<br>

<input id="title">

<br><br>


설명

<br>

<input id="description">

<br><br>


Hero 제목

<br>

<input id="heroTitle">

<br><br>


Hero 설명

<br>

<input id="heroDesc">

<br><br>


본문

<br>

<textarea id="content"
rows="15"
cols="80"></textarea>


<br><br>


<button onclick="generate()">

HTML 생성

</button>



<br><br>



<textarea
id="result"

rows="30"

cols="100">

</textarea>




<script>


function generate(){



let title =
document.getElementById("title").value;


let description =
document.getElementById("description").value;


let heroTitle =
document.getElementById("heroTitle").value;


let heroDesc =
document.getElementById("heroDesc").value;


let content =
document.getElementById("content").value;



let html = `


<title>

${title}

</title>



<meta name="description"

content="${description}">



<section class="hero">

<h2>

${heroTitle}

</h2>


<p>

${heroDesc}

</p>


</section>



<main class="container">

${content}

</main>



<script src="script.js"></script>



`;



document.getElementById("result").value
=
html;



}



</script>




</body>

</html>
